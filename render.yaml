envVarGroups:
  - name: hirebase-shared-secrets
    envVars:
      - key: APP_NAME
        value: HiringBase
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SETUP_TOKEN
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_LLM_MODEL
        value: Qwen/Qwen3-8B
      - key: HF_LLM_API_URL
        value: https://api-inference.huggingface.co/models/Qwen/Qwen3-8B
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEY_FALLBACK
        sync: false
      - key: GROQ_MODEL
        value: qwen/qwen3-32b
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-ocr-latest
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: SPACY_MODEL
        value: en_core_web_md
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_API_BASE_URL
        value: https://api.brevo.com/v3
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"

services:
  - type: web
    name: hirebase-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - fromGroup: hirebase-shared-secrets
